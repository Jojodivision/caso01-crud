<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/plantilla :: head}">
    <title>Bikes</title>
</head>
<body>

    <section th:fragment="botonCrear" class="py-4 mb-4 bg-light">
        <div class="container">
            <div class="row">
                <div class="col-md-3">
                    <button type="button" class="btn btn-success btn-block" data-bs-toggle="modal" data-bs-target="#agregarBike">
                        <i class="fas fa-plus"></i> [[#{bike.boton.agregar}]]
                    </button>
                </div>
            </div>
        </div>

        <div class="modal fade" id="agregarBike" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-md">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">[[#{bike.modal.titulo}]]</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/bike/guardar}" th:object="${bike}" method="POST" class="was-validated" enctype="multipart/form-data">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="marca">[[#{bike.marca}]]</label>
                                <input type="text" class="form-control" name="marca" required="true"/>
                            </div>
                            <div class="mb-3">
                                <label for="cilindraje">[[#{bike.cilindraje}]]</label>
                                <input type="number" class="form-control" name="cilindraje" required="true"/>
                            </div>
                            <div class="mb-3">
                                <label for="precio">[[#{bike.precio}]]</label>
                                <input type="number" step="0.01" class="form-control" name="precio" required="true"/>
                            </div>
                            <div class="mb-3">
                                <label for="imagenFile">[[#{bike.imagen}]]</label>
                                <input class="form-control" type="file" name="imagenFile" onchange="readURL(this);" accept="image/*"/>
                                <img id="blah" src="#" alt="Vista previa" height="150" class="mt-2 d-none"/>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section th:fragment="listado" id="bikes">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h4>[[#{bike.listado.titulo}]]</h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${bikes != null and !bikes.empty}" class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>#</th>
                                            <th>[[#{bike.marca}]]</th>
                                            <th>[[#{bike.cilindraje}]]</th>
                                            <th>[[#{bike.precio}]]</th>
                                            <th>[[#{bike.imagen}]]</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="bike, contador : ${bikes}">
                                            <td th:text="${contador.count}"></td>
                                            <td th:text="${bike.marca}"></td>
                                            <td th:text="${bike.cilindraje}"></td>
                                            <td th:text="${bike.precio}"></td>
                                            <td>
                                                <img th:src="${bike.rutaImagen}" alt="Imagen Bike" height="50"/>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="text-center p-2" th:if="${bikes == null or bikes.empty}">
                                <span>[[#{bike.listado.vacio}]]</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>

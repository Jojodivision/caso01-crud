<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    
    <head th:replace="~{general/plantilla :: head}">
        <title>TechShop</title>
    </head>
    
    <body>
        <header th:replace="~{general/plantilla :: header}"></header>

        <div class="container mt-4">
            <div class="row">
                <div class="col-12">
                    <h2 class="mb-4">Listado del Inventario</h2>
                    
                    <a th:href="@{/nuevo}" class="btn btn-success mb-3" th:text="#{accion.nuevo}">Nuevo</a>

                    <table class="table table-striped table-hover table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Inventario</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="producto : ${productos}">
                                <td th:text="${producto.idProducto}"></td>
                                <td th:text="${producto.nombre}"></td>
                                <td th:text="${producto.marca}"></td>
                                <td th:text="${producto.precio}"></td>
                                <td th:text="${producto.cantidadInventario}"></td>
                                <td>
                                    <a th:href="@{/modificar/} + ${producto.idProducto}" class="btn btn-primary btn-sm" th:text="#{accion.actualizar}">Actualizar</a>
                                    
                                    <a th:href="@{/eliminar/} + ${producto.idProducto}" class="btn btn-danger btn-sm" th:text="#{accion.eliminar}" onclick="return confirmarEliminacion();">Eliminar</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/plantilla :: footer}"></footer>
    </body>
</html>

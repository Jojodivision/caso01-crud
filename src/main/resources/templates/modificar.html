<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    
    <head th:replace="~{general/plantilla :: head}">
        <title>Formulario</title>
    </head>
    
    <body>
        <header th:replace="~{general/plantilla :: header}"></header>

        <div class="container mt-5 mb-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-header bg-dark text-white text-center">
                            <h2 th:text="${producto.idProducto != null} ? #{accion.actualizar} : #{accion.agregar}">Formulario</h2>
                        </div>
                        
                        <div class="card-body">
                            <form th:action="@{/guardar}" th:object="${producto}" method="post">
                                
                                <input type="hidden" th:field="*{idProducto}"/>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre:</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" required/>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Marca:</label>
                                    <input type="text" class="form-control" th:field="*{marca}" required/>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Precio:</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required/>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label fw-bold">Cantidad en Inventario:</label>
                                    <input type="number" class="form-control" th:field="*{cantidadInventario}" required/>
                                </div>
                                
                                <div class="d-flex justify-content-between">
                                    <button type="submit" class="btn btn-success" th:text="#{accion.guardar}">Guardar</button>
                                    <a th:href="@{/}" class="btn btn-secondary" th:text="#{accion.regresar}">Regresar</a>
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/plantilla :: footer}"></footer>
    </body>
</html>
